<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #cdd6f4; }
    .subtitle { color: #6c7086; font-size: 11px; margin-bottom: 16px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; flex-shrink: 0; }
    .dot.online { background: #22c55e; }
    .dot.offline { background: #ef4444; }
    #status-text { font-size: 12px; color: #a6adc8; }
    label { display: block; font-size: 11px; color: #6c7086; margin-bottom: 5px; margin-top: 12px; text-transform: uppercase; letter-spacing: .05em; }
    input, select {
      width: 100%;
      background: #181825;
      border: 1px solid #313244;
      color: #cdd6f4;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
    }
    input:focus, select:focus { border-color: #89b4fa; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    button {
      flex: 1;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button.secondary { background: #313244; color: #cdd6f4; font-weight: 500; }
    .shortcut-hint {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 14px;
      font-size: 11px;
      color: #6c7086;
      line-height: 1.7;
    }
    kbd {
      background: #313244;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      color: #cdd6f4;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h2>🎓 School AI</h2>
  <p class="subtitle">Powered by Ollama (local)</p>

  <div class="status-row">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Checking Ollama…</span>
  </div>

  <label>Text model (webpage questions)</label>
  <input type="text" id="text-model" placeholder="e.g. llama3" />

  <label>Vision model (screen capture)</label>
  <input type="text" id="vision-model" placeholder="e.g. llava" />

  <div class="btn-row">
    <button id="save-btn">Save</button>
    <button id="open-btn" class="secondary">Open overlay</button>
  </div>

  <div class="shortcut-hint">
    <strong style="color:#cdd6f4">Shortcuts</strong><br/>
    Toggle overlay: <kbd>⌘⇧A</kbd> / <kbd>Ctrl+Shift+A</kbd><br/>
    Capture screen: <kbd>⌘⇧S</kbd> / <kbd>Ctrl+Shift+S</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
